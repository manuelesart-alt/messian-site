<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фильмы — MESSIAN</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="page-films">

    <!-- Шапка -->
    <header class="header">
        <div class="header__inner">
            <a href="index.html" class="logo">
                <span class="logo__name">MESSIAN</span>
                <span class="logo__sub">composer · sound designer</span>
            </a>
            <div class="header__actions">
                <button class="lang-switch" aria-label="Switch language">
                    <span class="lang-switch__ru active">RU</span>
                    <span class="lang-switch__en">EN</span>
                </button>
                <a href="index.html" class="btn btn--outline" data-i18n="back-home">← На главную</a>
            </div>
        </div>
    </header>

    <!-- Заголовок -->
    <section class="films-hero">
        <h1 data-i18n="films-hero-title">Библиотека фильмов</h1>
        <p data-i18n="films-hero-sub">Музыка и звуковой дизайн для кино, рекламы и медиа</p>
    </section>

    <!-- Сетка фильмов -->
    <section class="films-grid">
        <div class="films-grid__inner">

            <!-- Фильм 1 -->
            <article class="film-card"
                     data-title="Stray"
                     data-year="2024"
                     data-category="Короткометражный фильм"
                     data-category-en="Short Film"
                     data-role="Композитор, саунд-дизайнер"
                     data-role-en="Composer, Sound Designer"
                     data-desc="Здесь описание проекта. Короткометражный фильм о поиске себя в большом городе. Оригинальный саундтрек написан для камерного оркестра с элементами электроники. Работа над звуковым дизайном включала полевые записи и гранулярный синтез."
                     data-desc-en="Project description. A short film about finding yourself in a big city. The original soundtrack was written for a chamber orchestra with electronic elements. Sound design work included field recordings and granular synthesis."
                     data-video="assets/video/film1.mp4">
                <div class="film-card__poster">
                    <img src="assets/images/film1.jpg" alt="Stray">
                    <div class="film-card__hover">
                        <div class="film-card__play-icon">▶</div>
                        <span class="film-card__category">Короткометражный фильм</span>
                    </div>
                </div>
                <div class="film-card__info">
                    <h3 class="film-card__title">Stray</h3>
                    <span class="film-card__year">2024</span>
                </div>
            </article>


            <!-- Фильм 3 — Google Drive -->
            <article class="film-card"
                     data-title="El Topo"
                     data-year="2023"
                     data-category="Фильм"
                     data-category-en="Film"
                     data-role="Саунд-дизайн, музыка"
                     data-role-en="Sound Design, Music"
                     data-desc="Рекламный ролик для международного бренда. Минималистичная электронная музыка с акцентом на звуковой дизайн. Каждый звук синхронизирован с движением на экране."
                     data-desc-en="A commercial for an international brand. Minimalist electronic music with a focus on sound design. Every sound is synchronized with on-screen motion."
                     data-video="https://drive.google.com/file/d/1Sl-79jnJjJJj5XViuNa_4719q6V6yVcu/view?usp=share_link">
                <div class="film-card__poster">
                    <img src="assets/images/film3.jpg" alt="El Topo">
                    <div class="film-card__hover">
                        <div class="film-card__play-icon">▶</div>
                        <span class="film-card__category">Реклама</span>
                    </div>
                </div>
                <div class="film-card__info">
                    <h3 class="film-card__title">El Topo</h3>
                    <span class="film-card__year">2023</span>
                </div>
            </article>

            <!-- Фильм 4 — Google Drive -->
            <article class="film-card"
                     data-title="Marie"
                     data-year="2023"
                     data-category="Игровой фильм"
                     data-category-en="Feature Film"
                     data-role="Композитор"
                     data-role-en="Composer"
                     data-desc="Полнометражный игровой фильм. Оркестровый саундтрек в скандинавском стиле. Основная тема написана для фортепиано и струнного квартета с электронными текстурами."
                     data-desc-en="A feature film. An orchestral soundtrack in Scandinavian style. The main theme is written for piano and string quartet with electronic textures."
                     data-video="https://drive.google.com/file/d/1PhVm4E4H2iOJmIPjcHSesOMo3lF7RtNQ/view?usp=share_link">
                <div class="film-card__poster">
                    <img src="assets/images/film4.jpg" alt="Marie">
                    <div class="film-card__hover">
                        <div class="film-card__play-icon">▶</div>
                        <span class="film-card__category">Игровой фильм</span>
                    </div>
                </div>
                <div class="film-card__info">
                    <h3 class="film-card__title">Marie</h3>
                    <span class="film-card__year">2023</span>
                </div>
            </article>

            <!-- Фильм 5 -->
            <article class="film-card"
                     data-title="На мельнице"
                     data-title-en="At the Mill"
                     data-year="2023"
                     data-category="Музыкальный клип"
                     data-category-en="Music Video"
                     data-role="Саунд-дизайн"
                     data-role-en="Sound Design"
                     data-desc="Музыкальный клип для электронного артиста. Звуковой дизайн с использованием модульных синтезаторов и обработанных полевых записей. Визуально-звуковая синестезия."
                     data-desc-en="A music video for an electronic artist. Sound design using modular synthesizers and processed field recordings. Visual-sonic synesthesia."
                     data-video="https://drive.google.com/file/d/1_PuavaN-MiIQWBC7FUuNfUnhd7C4shwy/view?usp=drivesdk">
                <div class="film-card__poster">
                    <img src="assets/images/film5.jpg" alt="На мельнице">
                    <div class="film-card__hover">
                        <div class="film-card__play-icon">▶</div>
                        <span class="film-card__category">Музыкальный клип</span>
                    </div>
                </div>
                <div class="film-card__info">
                    <h3 class="film-card__title" data-en="At the Mill">На мельнице</h3>
                    <span class="film-card__year">2023</span>
                </div>
            </article>


        </div>
    </section>

    <!-- Попап -->
<div class="film-popup" id="filmPopup">
    <div class="film-popup__overlay"></div>
    <div class="film-popup__window">
        <button class="film-popup__close"></button>

        <!-- Видеоплеер -->
        <div class="film-popup__player" id="playerContainer">
            <!-- Сюда JS вставит iframe или video -->
        </div>

        <!-- Информация -->
        <div class="film-popup__info">
            <span class="film-popup__category" id="popupCategory"></span>
            <h2 class="film-popup__title" id="popupTitle"></h2>
            <div class="film-popup__meta">
                <span class="film-popup__year" id="popupYear"></span>
                <span class="film-popup__role" id="popupRole"></span>
            </div>
            <p class="film-popup__desc" id="popupDesc"></p>
        </div>
    </div>
</div>

    <script src="js/script.js"></script>
</body>
</html>
